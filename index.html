<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Level Pro - Fixed Version</title>
    <!-- PWA 및 전체화면 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background: #000; margin: 0; font-family: -apple-system, sans-serif; touch-action: none; overflow: hidden; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .btn-active:active { transform: scale(0.95); opacity: 0.8; }
        /* 카메라 화면 반전 방지 및 전체 채우기 */
        video { object-fit: cover; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [appState, setAppState] = useState('PERMISSION_REQUIRED'); // PERMISSION_REQUIRED, RUNNING
            const [pitch, setPitch] = useState(0);
            const [roll, setRoll] = useState(0);
            const [tbm, setTbm] = useState(50.000);
            const [ih, setIh] = useState(null);
            const [deltaZ, setDeltaZ] = useState(0);
            const [reading, setReading] = useState("");
            const [snapshot, setSnapshot] = useState(null);
            const [logs, setLogs] = useState([]);
            
            const videoRef = useRef(null);
            const baseIh = useRef(null);
            const velocityZ = useRef(0);
            const lastTime = useRef(Date.now());

            // --- 1. 권한 요청 및 시스템 시작 ---
            const initializeSystem = async () => {
                try {
                    // 카메라 권한 요청
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment', focusMode: 'continuous' } 
                    });
                    
                    // iOS 자이로/가속도 권한 요청 (클릭 이벤트 내부에서 실행되어야 함)
                    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                        const orientationRes = await DeviceOrientationEvent.requestPermission();
                        if (orientationRes !== 'granted') {
                            alert("방향 센서 권한이 거부되었습니다.");
                            return;
                        }
                    }
                    
                    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                        await DeviceMotionEvent.requestPermission();
                    }

                    setAppState('RUNNING');
                    
                    // 권한 획득 후 센서 및 카메라 연결
                    setTimeout(() => {
                        if (videoRef.current) videoRef.current.srcObject = stream;
                        
                        window.addEventListener('deviceorientation', (e) => {
                            setPitch(e.beta || 0);
                            setRoll(e.gamma || 0);
                        });

                        window.addEventListener('devicemotion', (e) => {
                            if (!e.acceleration) return;
                            const now = Date.now();
                            const dt = (now - lastTime.current) / 1000;
                            lastTime.current = now;
                            const az = e.acceleration.z || 0;
                            if (Math.abs(az) > 0.2) {
                                velocityZ.current += az * dt;
                                setDeltaZ(prev => prev + (velocityZ.current * dt));
                            } else {
                                velocityZ.current *= 0.7;
                            }
                        });
                    }, 100);

                } catch (err) {
                    alert("시스템 시작 실패: " + err.message + "\n반드시 HTTPS 주소로 접속해야 합니다.");
                }
            };

            // --- 2. 로직 처리 ---
            // 수평 허용 오차 (0.5도 정도로 약간 완화하여 입력이 쉽도록 조정)
            const isHorizontal = Math.abs(pitch) < 0.5 && Math.abs(roll) < 0.5;

            const handleCapture = () => {
                setSnapshot({ pitch, roll, time: new Date().toLocaleTimeString() });
            };

            const completeMeasurement = () => {
                const val = parseFloat(reading);
                if (isNaN(val)) return;

                // 각도 보정 로직 (스냅샷 시점의 pitch 사용)
                // 실제 고도 = IH - (눈금 - 보정값)
                const correctedReading = val; // 여기서는 단순 구현, 필요시 tan 보정 추가

                if (ih === null) {
                    // BS 모드
                    const newIh = Number(tbm) + correctedReading;
                    baseIh.current = newIh;
                    setIh(newIh);
                    setDeltaZ(0);
                    setLogs([{ type: 'BS', val: newIh, time: snapshot.time }, ...logs]);
                } else {
                    // FS 모드
                    const currentIh = baseIh.current + deltaZ;
                    const elev = currentIh - correctedReading;
                    setLogs([{ type: 'FS', val: elev, time: snapshot.time }, ...logs]);
                }
                setSnapshot(null);
                setReading("");
            };

            // --- 3. UI 렌더링 ---
            if (appState === 'PERMISSION_REQUIRED') {
                return (
                    <div className="h-screen bg-slate-950 flex flex-col items-center justify-center p-8 text-center text-white">
                        <div className="w-20 h-20 bg-emerald-500 rounded-full mb-8 flex items-center justify-center animate-pulse">
                            <svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <h1 className="text-3xl font-black mb-4 tracking-tighter">측량 시작하기</h1>
                        <p className="text-slate-400 mb-10 text-sm leading-relaxed">
                            카메라와 센서 활성화를 위해<br/>아래 버튼을 눌러 권한을 허용해 주세요.
                        </p>
                        <button 
                            onClick={initializeSystem}
                            className="w-full py-5 bg-emerald-500 rounded-2xl font-black text-xl btn-active shadow-2xl shadow-emerald-900/20"
                        >
                            시스템 활성화
                        </button>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col bg-black text-white overflow-hidden">
                    {/* 상단: 카메라 영역 */}
                    <div className="relative flex-[1.2] bg-zinc-900">
                        <video ref={videoRef} autoPlay playsInline muted className="w-full h-full" />
                        
                        {/* 십자선 가이드 */}
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <div className={`w-full h-[1px] ${isHorizontal ? 'bg-emerald-400 shadow-[0_0_5px_white]' : 'bg-white/30'}`}></div>
                            <div className={`w-[1px] h-full ${isHorizontal ? 'bg-emerald-400 shadow-[0_0_5px_white]' : 'bg-white/30'}`}></div>
                            
                            {/* 버블 수평계 */}
                            <div className="absolute w-32 h-32 border border-white/20 rounded-full flex items-center justify-center">
                                <div 
                                    className={`w-5 h-5 rounded-full transition-transform duration-75 ${isHorizontal ? 'bg-emerald-400 shadow-lg' : 'bg-red-500'}`}
                                    style={{ transform: `translate(${roll * 3}px, ${pitch * 3}px)` }}
                                ></div>
                            </div>
                        </div>

                        {/* 실시간 상태 바 */}
                        <div className="absolute top-12 left-6 right-6 flex justify-between">
                            <div className="bg-black/60 backdrop-blur-md px-3 py-2 rounded-lg border border-white/10">
                                <p className="text-[10px] text-gray-500 font-bold uppercase">Angle</p>
                                <p className={`font-mono font-bold ${isHorizontal ? 'text-emerald-400' : 'text-white'}`}>{pitch.toFixed(2)}°</p>
                            </div>
                            <div className="bg-black/60 backdrop-blur-md px-3 py-2 rounded-lg border border-white/10 text-right">
                                <p className="text-[10px] text-blue-400 font-bold uppercase">Instrument HT</p>
                                <p className="font-mono font-black text-lg">{ih ? (baseIh.current + deltaZ).toFixed(3) : '---'}m</p>
                            </div>
                        </div>

                        {/* 셔터 버튼 */}
                        <div className="absolute bottom-6 w-full flex justify-center">
                            <button 
                                onClick={handleCapture}
                                className={`w-20 h-20 rounded-full border-4 flex items-center justify-center transition-all btn-active ${isHorizontal ? 'border-white bg-white/20' : 'border-zinc-700 bg-zinc-800'}`}
                            >
                                <div className={`w-16 h-16 rounded-full ${isHorizontal ? 'bg-white' : 'bg-zinc-600'}`}></div>
                            </button>
                        </div>
                    </div>

                    {/* 하단: 컨트롤 패널 */}
                    <div className="flex-1 bg-zinc-900 rounded-t-[2.5rem] p-6 safe-area-bottom shadow-2xl overflow-y-auto">
                        <div className="max-w-md mx-auto space-y-5">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-zinc-800 p-3 rounded-2xl">
                                    <label className="block text-[10px] text-zinc-500 font-bold mb-1 uppercase tracking-tighter">TBM Elevation</label>
                                    <input type="number" value={tbm} onChange={e=>setTbm(e.target.value)} disabled={ih !== null} className="w-full bg-transparent text-xl font-mono font-bold outline-none disabled:opacity-50" />
                                </div>
                                <div className="bg-zinc-800/50 p-3 rounded-2xl flex flex-col justify-center border border-white/5">
                                    <p className="text-[10px] text-zinc-500 font-bold uppercase">Shift (ΔZ)</p>
                                    <p className="font-mono font-bold text-emerald-400">{deltaZ > 0 ? '+' : ''}{deltaZ.toFixed(3)}m</p>
                                </div>
                            </div>

                            <div className="border-t border-white/5 pt-4">
                                <div className="flex justify-between items-center mb-2">
                                    <p className="text-[10px] text-zinc-500 font-black uppercase">Measurement Log</p>
                                    <button onClick={()=>location.reload()} className="text-[10px] text-blue-400 font-bold underline">초기화</button>
                                </div>
                                <div className="space-y-2 max-h-40 overflow-y-auto pr-1">
                                    {logs.length === 0 && <p className="text-center py-6 text-zinc-700 text-sm italic">기록이 없습니다. 수평을 맞춰 셔터를 누르세요.</p>}
                                    {logs.map((l, i) => (
                                        <div key={i} className="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-white/5">
                                            <span className={`text-[10px] font-black px-2 py-1 rounded ${l.type === 'BS' ? 'bg-blue-600' : 'bg-emerald-600'}`}>{l.type}</span>
                                            <span className="text-xs text-zinc-500 font-mono">{l.time}</span>
                                            <span className="font-mono font-bold text-lg">{l.val.toFixed(3)}m</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 입력 팝업 레이어 */}
                    {snapshot && (
                        <div className="absolute inset-0 bg-black/95 z-[100] flex flex-col items-center justify-center p-8 backdrop-blur-xl">
                            <div className="text-center mb-10">
                                <div className="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <svg className="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                                </div>
                                <p className="text-emerald-400 text-sm font-black tracking-widest uppercase">{ih === null ? 'Backsight (BS)' : 'Foresight (FS)'} 촬영 완료</p>
                                <p className="text-xs text-zinc-500 mt-2 font-mono">Captured at {snapshot.pitch.toFixed(3)}°</p>
                            </div>

                            <input 
                                type="number" 
                                autoFocus
                                placeholder="스태프 눈금 입력"
                                value={reading}
                                onChange={e => setReading(e.target.value)}
                                className="w-full bg-transparent border-b-4 border-emerald-500 p-4 text-6xl text-center font-mono text-white mb-10 outline-none"
                            />

                            <div className="flex gap-4 w-full max-w-sm">
                                <button onClick={() => setSnapshot(null)} className="flex-1 py-5 bg-zinc-800 rounded-2xl font-bold">취소</button>
                                <button onClick={completeMeasurement} className="flex-1 py-5 bg-emerald-600 rounded-2xl font-black text-xl shadow-lg">확인</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
